name: '📦'

on:
  workflow_dispatch:
    inputs:
      file_urls:
        description: '🔗 لینک مستقیم فایل‌ها (با کاما جدا کنید) مثال: url1,url2,url3'
        required: true
        type: string
      password:
        description: '🔐 رمز فایل فشرده (اختیاری)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  download-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: 🔄 دریافت کد مخزن
        uses: actions/checkout@v4

      - name: ⚙️ نصب ابزارها
        run: |
          sudo apt-get update
          sudo apt-get install -y p7zip-full file aria2 curl

      - name: 🔧 تنظیم بافر HTTP (1.5 گیگابایت)
        run: |
          git config --global http.postBuffer 1610612736
          git config --global http.lowSpeedLimit 0
          git config --global http.lowSpeedTime 999999

      - name: 📥 پردازش و دانلود فایل‌ها
        run: |
          # آماده‌سازی لیست لینک‌ها
          echo "${{ github.event.inputs.file_urls }}" | tr ',' '\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' > /tmp/urls.txt
          TOTAL_URLS=$(wc -l < /tmp/urls.txt)
          echo "🔹 تعداد کل لینک‌ها: $TOTAL_URLS"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          COUNTER=0
          while IFS= read -r URL; do
            [ -z "$URL" ] && continue
            COUNTER=$((COUNTER+1))
            echo ""
            echo "============================================================"
            echo "🔽 [${COUNTER}/${TOTAL_URLS}] شروع پردازش: $URL"
            echo "============================================================"

            # ----- مرحله 1: استخراج نام واقعی فایل (چند روش) -----
            echo "🔍 [1/4] شناسایی نام فایل..."
            REAL_FILENAME=$(curl -sI "$URL" | grep -i 'Content-Disposition' | sed -n 's/.*filename="\([^"]*\)".*/\1/p')
            if [ -z "$REAL_FILENAME" ]; then
              REAL_FILENAME=$(echo "$URL" | grep -oP '(?<=filename=)[^&]+' | sed 's/%20/ /g' 2>/dev/null || true)
            fi
            if [ -z "$REAL_FILENAME" ]; then
              REAL_FILENAME=$(basename "$URL" | sed 's/\?.*//' | sed 's/%20/ /g')
            fi
            if [ -z "$REAL_FILENAME" ]; then
              REAL_FILENAME="file_$(date +%s)"
            fi
            SAFE_FILENAME=$(echo "$REAL_FILENAME" | sed 's/[\\/:*?"<>|]/_/g')
            echo "   📛 نام پایه: $SAFE_FILENAME"

            # ----- مرحله 2: دانلود با تلاش مجدد (تا 10 بار) -----
            echo "⏳ [2/4] دانلود فایل (با قابلیت ادامه و تلاش مجدد)..."
            MAX_RETRIES=10
            RETRY=0
            SUCCESS=false
            while [ $RETRY -lt $MAX_RETRIES ] && [ "$SUCCESS" = false ]; do
              if [ $RETRY -gt 0 ]; then
                echo "   ⚠️ تلاش مجدد $RETRY/$MAX_RETRIES (بعد از ۱۰ ثانیه)..."
                sleep 10
              fi
              aria2c --user-agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
                     --max-connection-per-server=4 --split=4 --min-split-size=1M \
                     --continue=true --retry-wait=10 --max-tries=1 --timeout=60 \
                     --console-log-level=error -o "$SAFE_FILENAME" "$URL" > /tmp/aria2.log 2>&1
              if [ $? -eq 0 ]; then
                SUCCESS=true
                echo "   ✅ دانلود کامل شد."
              else
                RETRY=$((RETRY+1))
              fi
            done
            if [ "$SUCCESS" = false ]; then
              echo "❌ خطا: دانلود فایل $SAFE_FILENAME پس از $MAX_RETRIES تلاش ناموفق بود."
              exit 1
            fi

            # ----- مرحله 3: تشخیص فرمت واقعی و اضافه کردن پسوند -----
            echo "🔍 [3/4] تشخیص فرمت فایل و اصلاح پسوند..."
            REAL_MIME=$(file -b --mime-type "$SAFE_FILENAME")
            EXT=""
            case "$REAL_MIME" in
              video/mp4) EXT="mp4" ;; video/webm) EXT="webm" ;;
              video/x-matroska) EXT="mkv" ;; audio/mpeg) EXT="mp3" ;;
              audio/ogg) EXT="ogg" ;; image/jpeg) EXT="jpg" ;;
              image/png) EXT="png" ;; application/pdf) EXT="pdf" ;;
            esac
            if [ -n "$EXT" ]; then
              NEW_NAME="${SAFE_FILENAME%.*}.$EXT"
              if [ "$NEW_NAME" != "$SAFE_FILENAME" ]; then
                mv "$SAFE_FILENAME" "$NEW_NAME"
                SAFE_FILENAME="$NEW_NAME"
                echo "   ✅ پسوند اضافه شد: $SAFE_FILENAME"
              else
                echo "   ✅ پسوند درست است."
              fi
            else
              echo "   ⚠️ فرمت ناشناخته، بدون تغییر باقی ماند."
            fi

            # ----- مرحله 4: دسته‌بندی و فشرده‌سازی به قطعات 20 مگابایتی -----
            echo "📁 [4/4] ایجاد آرشیو با شناسه تصادفی (قطعات 20 مگابایت)..."
            # ساخت شناسه تصادفی
            RANDOM_ID=$(openssl rand -hex 8)

            FINAL_DIR="downloads/$RANDOM_ID"

            mkdir -p "$FINAL_DIR"
            rm -f "$FINAL_DIR"/*.7z*

            if [ -z "${{ github.event.inputs.password }}" ]; then
              # 7z a -mhe=on -mx=3 -v90m "$FINAL_DIR/archive.7z" "./$SAFE_FILENAME" > /dev/null
              7z a -mhe=on -mx=3 -v90m "$FINAL_DIR/archive.7z" "./$SAFE_FILENAME" > /dev/null
            else
              # 7z a -p"${{ github.event.inputs.password }}" -mhe=on -mx=3 -v90m "$FINAL_DIR/archive.7z" "./$SAFE_FILENAME" > /dev/null
              7z a -p"${{ github.event.inputs.password }}" -mhe=on -mx=3 -v90m "$FINAL_DIR/archive.7z" "./$SAFE_FILENAME" > /dev/null
            fi
            rm -f "$SAFE_FILENAME"
            echo "   ✅ آرشیو در $FINAL_DIR ساخته شد."

            # ----- push تدریجی با تأخیر و تلاش مجدد (۳ بار) -----
            echo "📤 ارسال به مخزن (push تدریجی)..."
            git add "$FINAL_DIR/"
            if git commit -m "Add $FOLDER_NAME [$(date +'%H:%M:%S')]"; then
              for i in 1 2 3; do
                if git push --force-with-lease origin HEAD:${GITHUB_REF#refs/heads/}; then
                  echo "   ✅ push انجام شد."
                  break
                else
                  echo "   ⚠️ خطا در push، تلاش مجدد ($i/3) بعد از ۱۰ ثانیه..."
                  sleep 10
                fi
              done
            else
              echo "   ⚠️ بدون تغییر جدید (هیچ فایلی اضافه نشده)"
            fi
            sleep 5   # تأخیر بین پردازش فایل‌های مختلف

          done < /tmp/urls.txt

          echo ""
          echo "============================================================"
          echo "🎉 همه لینک‌ها با موفقیت پردازش شدند."
          echo "============================================================"
